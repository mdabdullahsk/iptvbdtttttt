<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalsha Movies Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; text-align: center; }
        video { width: 100%; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        h2 { color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Jalsha Movies - Live</h2>
    <video id="video" controls autoplay></video>
</div>

<script>
    var video = document.getElementById('video');
    var videoSrc = 'https://github.com/mdabdullahsk/iptvbdtttttt/raw/refs/heads/main/jalsha_movies.m3u8';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    }
    // সাফারি ব্রাউজারের জন্য সরাসরি সাপোর্ট
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }
</script>

</body>
</html>
